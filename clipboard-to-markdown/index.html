<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
    {{> head}}
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans transition-colors duration-200">
    {{> sidebar}}
    {{> header}}

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8 w-full flex flex-col">
        <div
            class="shrink-0 mb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white sm:hidden mb-2 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    クリップボードからマークダウンに変換
                </h2>
                <p class="text-gray-600 dark:text-gray-400">
                    ウェブページなどをコピーして下のテキストエリアにペーストすると、自動的にマークダウン形式に変換されて入力されます。
                </p>
            </div>
        </div>

        <div class="flex-grow flex flex-col pb-2 lg:pb-6 h-[calc(100dvh-280px)] min-h-[500px]">
            <div
                class="flex flex-col h-full min-h-0 bg-white dark:bg-gray-800 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500 border border-gray-200/50 dark:border-gray-700/50 shadow-sm relative">
                <div
                    class="shrink-0 bg-gray-100/50 dark:bg-gray-800/50 px-5 py-3 border-b border-gray-200/50 dark:border-gray-700/50 flex justify-between items-center backdrop-blur-sm relative z-10">
                    <h3 class="font-medium text-gray-700 dark:text-gray-300 flex items-center">
                        <span class="w-2 h-2 rounded-full bg-indigo-500 mr-2"></span> エディタ
                    </h3>
                    <div class="flex items-center gap-2">
                        {{> copy-button}}
                        <div class="h-4 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>
                        {{> clear-button}}
                    </div>
                </div>
                <textarea id="editor"
                    class="flex-grow min-h-0 w-full p-5 bg-transparent text-gray-900 dark:text-gray-100 resize-none focus:outline-none font-mono text-sm leading-relaxed placeholder-gray-400 dark:placeholder-gray-500 overflow-y-auto"
                    spellcheck="false" placeholder="ここにウェブページの内容をペーストしてください..."></textarea>
            </div>
        </div>
    </main>

    {{> footer}}

    <script type="module" src="../nav.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
