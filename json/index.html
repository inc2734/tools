<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
    {{> head}}
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-[100dvh] overflow-hidden flex flex-col font-sans transition-colors duration-200">
    {{> sidebar}}
    {{> header}}

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8 w-full flex flex-col min-h-0">
        <div
            class="shrink-0 mb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white sm:hidden mb-2 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                    JSON 整形
                </h2>
                <p class="text-gray-600 dark:text-gray-400">
                    左側にJSON文字列を貼り付けると、右側にきれいにフォーマットされたJSONが表示されます。
                </p>
            </div>

            <div
                class="flex items-center space-x-3 bg-white/60 dark:bg-gray-800/60 p-1.5 rounded-xl border border-gray-200/50 dark:border-gray-700/50 backdrop-blur-sm">
                <label class="text-sm font-medium text-gray-600 dark:text-gray-400 pl-2">インデント:</label>
                <select id="indent-select"
                    class="bg-white dark:bg-gray-700 border-none text-gray-900 dark:text-white text-sm rounded-lg py-1.5 pl-3 pr-8 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer appearance-none">
                    <option value="2">2スペース</option>
                    <option value="4">4スペース</option>
                    <option value="tab">タブ</option>
                </select>
            </div>
        </div>

        <div class="shrink-0 w-full mb-3 flex items-center">
            {{> error-message}}
        </div>

        <div class="flex-grow grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6 pb-2 lg:pb-6 min-h-0">
            <!-- Input Layer -->
            <div
                class="flex flex-col h-full min-h-0 glass rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500">
                <div
                    class="shrink-0 bg-gray-100/50 dark:bg-gray-800/50 px-5 py-3 border-b border-gray-200/50 dark:border-gray-700/50 flex justify-between items-center backdrop-blur-sm">
                    <h3 class="font-medium text-gray-700 dark:text-gray-300 flex items-center">
                        <span class="w-2 h-2 rounded-full bg-indigo-500 mr-2"></span> 入力 (未整形 JSON)
                    </h3>
                    {{> clear-button}}
                </div>
                <textarea id="input-text"
                    class="flex-grow min-h-0 w-full p-5 bg-transparent text-gray-900 dark:text-gray-100 resize-none focus:outline-none font-mono text-sm leading-relaxed placeholder-gray-400 dark:placeholder-gray-500 whitespace-pre overflow-y-auto"
                    spellcheck="false"></textarea>
            </div>

            <!-- Output Layer -->
            <div id="output-container"
                class="flex flex-col h-full min-h-0 glass rounded-2xl overflow-hidden relative transition-colors duration-300 border-2 border-transparent">
                <div
                    class="shrink-0 bg-gray-100/50 dark:bg-gray-800/50 px-5 py-3 border-b border-gray-200/50 dark:border-gray-700/50 flex justify-between items-center backdrop-blur-sm relative z-10">
                    <h3 class="font-medium text-gray-700 dark:text-gray-300 flex items-center">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span> 出力結果
                    </h3>
                    {{> copy-button}}
                </div>
                <textarea id="output-text"
                    class="flex-grow min-h-0 w-full p-5 bg-black/5 dark:bg-black/20 text-gray-900 dark:text-gray-100 resize-none focus:outline-none font-mono text-sm leading-relaxed whitespace-pre overflow-y-auto"
                    readonly spellcheck="false"></textarea>

            </div>
        </div>
    </main>

    {{> footer}}

    <script type="module" src="../nav.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
